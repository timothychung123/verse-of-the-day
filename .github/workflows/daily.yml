name: Daily Verse

on:
  schedule:
    # 6:00 AM UTC every day (adjust to your preferred timezone)
    - cron: '0 6 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Configure git
        run: |
          git config user.name  "Verse Bot"
          git config user.email "verse-bot@users.noreply.github.com"

      - name: Generate today's verse
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_USERNAME:   ${{ github.repository_owner }}
        run: python scripts/generate_verse.py

      - name: Push changes
        run: git push origin main
